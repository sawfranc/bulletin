<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bulletin Santé Hebdomadaire - Surveillance Épidémiologique</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f0f7fc 0%, #e9f2f8 100%);
            font-family: 'Inter', sans-serif;
            padding: 30px 20px;
            color: #03396c;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #005b96, #011f4b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .header p {
            color: #2c7da0;
            font-weight: 500;
            margin-top: 8px;
            font-size: 1rem;
        }

        .badge-date {
            background: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            margin-top: 15px;
            font-weight: 600;
            color: #005b96;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0 30px;
            flex-wrap: wrap;
        }

        .btn-toggle {
            background: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #2c7da0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            font-family: 'Inter', sans-serif;
        }

        .btn-toggle.active {
            background: #005b96;
            color: white;
            box-shadow: 0 4px 12px rgba(0,91,150,0.3);
        }

        .btn-toggle i {
            margin-right: 6px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.03), 0 6px 6px rgba(0, 0, 0, 0.05);
            padding: 20px 16px 20px 16px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid rgba(144, 202, 249, 0.3);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -12px rgba(0, 91, 150, 0.2);
            border-color: #90caf9;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eef2f8;
            padding-bottom: 12px;
        }

        .icon-circle {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, #eaf6ff, #d4e9fa);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            color: #026aa7;
        }

        .indicator-title {
            font-weight: 700;
            font-size: 1rem;
            line-height: 1.3;
            color: #03396c;
            flex: 1;
        }

        .gauge-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 10px auto 15px auto;
        }

        canvas.gauge-canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .value-label {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 800;
            margin-top: 5px;
            color: #0a4c6e;
        }

        .sub {
            font-size: 0.7rem;
            font-weight: 500;
            color: #5e8d9f;
            text-align: center;
            margin-top: -5px;
        }

        .cumul-badge {
            text-align: center;
            margin-top: 12px;
            padding: 8px 10px;
            background: #f8fafc;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #2c7da0;
        }

        .cumul-badge i {
            margin-right: 5px;
            font-size: 0.7rem;
        }

        .footer-note {
            text-align: center;
            margin-top: 40px;
            font-size: 0.8rem;
            color: #4b7a9c;
            border-top: 1px solid #cde3ef;
            padding-top: 25px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: #005b96;
        }

        @media (max-width: 640px) {
            .grid {
                gap: 16px;
            }
            .card {
                padding: 16px;
            }
            .gauge-container {
                width: 110px;
                height: 110px;
            }
            .value-label {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-chart-line" style="color:#2c7da0;"></i> Bulletin Santé Hebdomadaire</h1>
        <p>Surveillance épidémiologique • Indicateurs clés</p>
        <div class="badge-date">
            <i class="far fa-calendar-alt"></i> 
            Semaine du <span id="currentWeek">-- au --</span>
        </div>
    </div>

    <div class="controls">
        <button class="btn-toggle active" id="btnWeek">
            <i class="fas fa-chart-simple"></i> Semaine en cours
        </button>
        <button class="btn-toggle" id="BtnCumul">
            <i class="fas fa-chart-line"></i> Cumul
        </button>
    </div>

    <div id="indicatorsGrid" class="grid">
        <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Chargement des données...</div>
    </div>
    
    <div class="footer-note">
        <i class="fas fa-database"></i> Données issues de <strong>donnée.json</strong> (GitHub) • Mise à jour hebdomadaire
    </div>
</div>

<script>
    // Configuration des indicateurs avec icônes et seuils maximums (pour les cadrans)
    // Les seuils sont définis pour la semaine en cours. Pour le cumul, on utilise un seuil plus large.
    const indicatorsConfig = [
        { name: "Méningite", icon: "fas fa-brain", color: "#5d9bc7", seuilHebdo: 20, seuilCumul: 200 },
        { name: "Rougeole", icon: "fas fa-allergies", color: "#e68a2e", seuilHebdo: 15, seuilCumul: 150 },
        { name: "Diarrhée sanglante (Shigella)", icon: "fas fa-poop", color: "#bc7a5e", seuilHebdo: 30, seuilCumul: 300 },
        { name: "Paralysie flasque aiguë (PFA)", icon: "fas fa-wheelchair", color: "#6f8faf", seuilHebdo: 10, seuilCumul: 80 },
        { name: "Choléra", icon: "fas fa-tint", color: "#469b9c", seuilHebdo: 15, seuilCumul: 100 },
        { name: "Dengue suspects", icon: "fas fa-bug", color: "#e09d32", seuilHebdo: 60, seuilCumul: 500 },
        { name: "Dengue probables", icon: "fas fa-vial", color: "#cd7b3c", seuilHebdo: 40, seuilCumul: 350 },
        { name: "Dengue hospitalisés", icon: "fas fa-hospital-user", color: "#ce6a85", seuilHebdo: 25, seuilCumul: 200 },
        { name: "Syndrome grippal", icon: "fas fa-head-side-cough", color: "#5fa7b2", seuilHebdo: 200, seuilCumul: 1500 },
        { name: "Tétanos néonatal", icon: "fas fa-baby-carriage", color: "#ba94c2", seuilHebdo: 5, seuilCumul: 30 },
        { name: "IRAS", icon: "fas fa-lungs", color: "#62b5b5", seuilHebdo: 300, seuilCumul: 2500 },
        { name: "Ictère fébrile", icon: "fas fa-temperature-high", color: "#e09e4a", seuilHebdo: 25, seuilCumul: 200 },
        { name: "COVID-19", icon: "fas fa-virus", color: "#ac4e6b", seuilHebdo: 150, seuilCumul: 1200 },
        { name: "Décès maternel", icon: "fas fa-female", color: "#b3586e", seuilHebdo: 8, seuilCumul: 50 },
        { name: "Mort-né", icon: "fas fa-dove", color: "#978dad", seuilHebdo: 10, seuilCumul: 70 },
        { name: "Décès périnatal", icon: "fas fa-heart-broken", color: "#bf7b8a", seuilHebdo: 12, seuilCumul: 80 },
        { name: "Total Paludisme simple", icon: "fas fa-mosquito", color: "#47945c", seuilHebdo: 500, seuilCumul: 4000 },
        { name: "Paludisme de moins de 5 ans", icon: "fas fa-child", color: "#61b873", seuilHebdo: 250, seuilCumul: 2000 },
        { name: "Paludisme grave", icon: "fas fa-exclamation-triangle", color: "#da8044", seuilHebdo: 80, seuilCumul: 600 },
        { name: "Paludisme grave de moins de 5 ans", icon: "fas fa-baby", color: "#e5955a", seuilHebdo: 50, seuilCumul: 400 }
    ];

    let chartInstances = {};
    let currentData = []; // Stocke les données chargées depuis JSON
    let currentView = "week"; // "week" ou "cumul"

    // Générer un ID unique pour chaque canvas
    function generateId(name) {
        return "gauge_" + name.replace(/\s/g, '_').replace(/[\(\)]/g, '');
    }

    // Créer un gauge circulaire
    function createGaugeChart(canvasId, value, maxValue, color) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        const percentage = Math.min(100, (value / maxValue) * 100);
        const remainder = 100 - percentage;
        
        return new Chart(ctx, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [percentage, remainder],
                    backgroundColor: [color, '#e9ecef'],
                    borderWidth: 0,
                    circumference: 270,
                    rotation: 225,
                    cutout: '70%',
                    borderRadius: 8,
                    spacing: 2,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    tooltip: { enabled: false },
                    legend: { display: false }
                },
                events: []
            }
        });
    }

    // Mettre à jour tous les cadrans et textes
    function refreshAllCharts() {
        if (!currentData.length) return;
        
        indicatorsConfig.forEach(config => {
            const dataItem = currentData.find(d => d.indicateur === config.name);
            if (!dataItem) return;
            
            const valeur = currentView === "week" ? dataItem.semaine : dataItem.cumul;
            const seuil = currentView === "week" ? config.seuilHebdo : config.seuilCumul;
            const canvasId = generateId(config.name);
            const chart = chartInstances[canvasId];
            
            if (chart) {
                const percentage = Math.min(100, (valeur / seuil) * 100);
                chart.data.datasets[0].data = [percentage, 100 - percentage];
                chart.update();
            }
            
            // Mettre à jour les textes dans la carte
            const cardDiv = document.getElementById(canvasId)?.closest('.card');
            if (cardDiv) {
                const valLabel = cardDiv.querySelector('.value-label');
                if (valLabel) {
                    valLabel.innerHTML = `${valeur} <span style="font-size:0.9rem;">/ ${seuil}</span>`;
                }
                const percentVal = Math.min(100, Math.round((valeur / seuil) * 100));
                const subSpan = cardDiv.querySelector('.sub');
                if (subSpan) {
                    const unitText = currentView === "week" ? "semaine" : "cumul annuel";
                    subSpan.innerHTML = `${percentVal}% du seuil (${unitText})`;
                }
                const cumulSpan = cardDiv.querySelector('.cumul-badge span');
                if (cumulSpan && currentView === "week") {
                    cumulSpan.innerHTML = `Cumul: ${dataItem.cumul}`;
                } else if (cumulSpan && currentView === "cumul") {
                    cumulSpan.innerHTML = `Semaine: ${dataItem.semaine}`;
                }
            }
        });
    }

    // Construire le tableau de bord complet
    function buildDashboard(data) {
        const gridContainer = document.getElementById('indicatorsGrid');
        gridContainer.innerHTML = '';
        
        indicatorsConfig.forEach(config => {
            const dataItem = data.find(d => d.indicateur === config.name);
            if (!dataItem) return;
            
            const valeur = currentView === "week" ? dataItem.semaine : dataItem.cumul;
            const seuil = currentView === "week" ? config.seuilHebdo : config.seuilCumul;
            const percentValue = Math.min(100, Math.round((valeur / seuil) * 100));
            const canvasId = generateId(config.name);
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="icon-circle" style="background: linear-gradient(145deg, #e6f2fa, #d4e6f2);">
                        <i class="${config.icon}" style="color: ${config.color};"></i>
                    </div>
                    <div class="indicator-title">${config.name}</div>
                </div>
                <div class="gauge-container">
                    <canvas id="${canvasId}" width="140" height="140" class="gauge-canvas"></canvas>
                </div>
                <div class="value-label">${valeur} <span style="font-size:0.9rem;">/ ${seuil}</span></div>
                <div class="sub">${percentValue}% du seuil (${currentView === "week" ? "semaine" : "cumul annuel"})</div>
                <div class="cumul-badge">
                    <i class="fas fa-chart-simple"></i> 
                    <span>${currentView === "week" ? `Cumul: ${dataItem.cumul}` : `Semaine: ${dataItem.semaine}`}</span>
                </div>
            `;
            gridContainer.appendChild(card);
            
            // Créer le chart après l'ajout au DOM
            const canvasElem = document.getElementById(canvasId);
            if (canvasElem) {
                const chart = createGaugeChart(canvasId, valeur, seuil, config.color);
                chartInstances[canvasId] = chart;
            }
        });
    }

    // Charger les données depuis le fichier JSON
    async function loadDataFromGitHub() {
        try {
            // Chemin relatif car le JSON est dans le même dépôt que la page HTML
            const response = await fetch('donnée.json');
            if (!response.ok) {
                throw new Error(`HTTP ${response.status} - Fichier JSON non trouvé`);
            }
            const jsonData = await response.json();
            
            // Le JSON doit être un tableau d'objets avec les propriétés: indicateur, semaine, cumul
            // Exemple: [{ "indicateur": "Méningite", "semaine": 4, "cumul": 32 }, ...]
            if (!Array.isArray(jsonData)) {
                throw new Error("Le JSON doit être un tableau d'indicateurs");
            }
            
            currentData = jsonData;
            buildDashboard(currentData);
            setCurrentWeek();
        } catch (error) {
            console.error("Erreur de chargement des données:", error);
            const gridContainer = document.getElementById('indicatorsGrid');
            gridContainer.innerHTML = `
                <div style="grid-column:1/-1; text-align:center; padding:40px; background:white; border-radius:32px;">
                    <i class="fas fa-exclamation-triangle" style="font-size:2rem; color:#d9534f;"></i>
                    <h3 style="margin-top:15px;">Impossible de charger donnée.json</h3>
                    <p style="margin-top:10px;">Vérifiez que le fichier existe dans le même répertoire que cette page HTML.<br>
                    Format attendu: <code>[{"indicateur":"Méningite","semaine":4,"cumul":32}, ...]</code></p>
                </div>
            `;
        }
    }

    // Définir la semaine courante dans l'en-tête
    function setCurrentWeek() {
        const today = new Date();
        const startOfWeek = new Date(today);
        const day = today.getDay();
        const diffToMonday = (day === 0 ? 6 : day - 1);
        startOfWeek.setDate(today.getDate() - diffToMonday);
        const endOfWeek = new Date(startOfWeek);
        endOfWeek.setDate(startOfWeek.getDate() + 6);
        const options = { day: 'numeric', month: 'long' };
        const startStr = startOfWeek.toLocaleDateString('fr-FR', options);
        const endStr = endOfWeek.toLocaleDateString('fr-FR', options);
        const weekSpan = document.getElementById('currentWeek');
        if (weekSpan) {
            weekSpan.innerText = `${startStr} au ${endStr} ${today.getFullYear()}`;
        }
    }

    // Changer la vue (semaine/cumul)
    function setView(view) {
        currentView = view;
        
        // Mettre à jour l'apparence des boutons
        const btnWeek = document.getElementById('btnWeek');
        const btnCumul = document.getElementById('BtnCumul');
        if (view === "week") {
            btnWeek.classList.add('active');
            btnCumul.classList.remove('active');
        } else {
            btnWeek.classList.remove('active');
            btnCumul.classList.add('active');
        }
        
        // Reconstruire le dashboard avec les mêmes données mais vue différente
        if (currentData.length) {
            // Nettoyer les anciens chart instances
            Object.values(chartInstances).forEach(chart => chart?.destroy());
            chartInstances = {};
            buildDashboard(currentData);
        }
    }

    // Écouteurs d'événements
    document.getElementById('btnWeek').addEventListener('click', () => setView('week'));
    document.getElementById('BtnCumul').addEventListener('click', () => setView('cumul'));
    
    // Chargement initial
    loadDataFromGitHub();
    
    // Gérer le redimensionnement pour les charts
    window.addEventListener('resize', () => {
        Object.values(chartInstances).forEach(chart => chart?.resize());
    });
</script>
</body>
</html>
